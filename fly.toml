app = "classwrite"
primary_region = "bom"

[build]
  dockerfile = "backend/Dockerfile"
  build_context = "backend"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1